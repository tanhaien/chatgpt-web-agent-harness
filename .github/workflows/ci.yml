name: CI

on:
  push:
  pull_request:

jobs:
  server:
    name: Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Syntax check
        run: |
          node --check server.mjs
          node --check test-agent.mjs
          node --check test-security.mjs
        working-directory: server
      - name: Run MCP tests
        working-directory: server
        run: |
          $port = 18987
          $ws = Join-Path ([System.IO.Path]::GetTempPath()) ("lca-ci-" + [guid]::NewGuid().ToString("N"))
          New-Item -ItemType Directory -Force -Path $ws | Out-Null
          $env:PORT = "$port"
          $env:AGENT_WORKSPACE = $ws
          $env:AGENT_MODE = "safe"
          $env:AGENT_EXTRA_ROOTS_JSON = "[]"
          $env:DASHBOARD_PORT = "0"
          $env:TEST_ENDPOINT = "http://127.0.0.1:$port/mcp"
          $out = Join-Path $PWD "ci-server.out.log"
          $err = Join-Path $PWD "ci-server.err.log"
          $server = Start-Process -FilePath "node" -ArgumentList "server.mjs" -WorkingDirectory $PWD -PassThru -RedirectStandardOutput $out -RedirectStandardError $err
          try {
            $ready = $false
            for ($i = 0; $i -lt 40; $i++) {
              try {
                Invoke-WebRequest -Uri "http://127.0.0.1:$port/healthz" -UseBasicParsing -TimeoutSec 2 | Out-Null
                $ready = $true
                break
              } catch {
                Start-Sleep -Milliseconds 500
              }
            }
            if (-not $ready) {
              Get-Content $out -ErrorAction SilentlyContinue
              Get-Content $err -ErrorAction SilentlyContinue
              throw "server did not become healthy"
            }
            node test-agent.mjs
            node test-security.mjs
          } finally {
            Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $ws -Recurse -Force -ErrorAction SilentlyContinue
          }

  tray-windows:
    name: Tray app (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish tray app
        run: powershell -ExecutionPolicy Bypass -File build.ps1
        working-directory: tray-app
